<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تطبيق الملاحظات</title>
  <style>
    body {
      font-family: Tahoma, sans-serif;
      background: #fce4ec;
      padding: 20px;
    }
    h1 {
      color: #d81b60;
    }
    input, textarea, button {
      display: block;
      margin: 10px 0;
      padding: 8px;
      width: 300px;
    }
    .note {
      background: #fff;
      border: 1px solid #ccc;
      margin: 5px 0;
      padding: 10px;
    }
  </style>
  <!-- Firebase SDK (v8 compat) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
  <h1>تطبيق الملاحظات</h1>

  <label>اسم المسوّقة:</label>
  <input type="text" id="marketerName" placeholder="اكتب اسمك هنا">

  <label>ملاحظة جديدة:</label>
  <textarea id="noteText" placeholder="اكتب الملاحظة هنا"></textarea>
  <button onclick="addNote()">إضافة الملاحظة</button>

  <h2>الملاحظات:</h2>
  <div id="notesList"></div>

  <script>
    // بيانات مشروعك من Firebase Console
    const firebaseConfig = {
      apiKey: "AIzaSyDjJhFE4SzwmZDrpz3278Gq-OX1jQgFAVY",
      authDomain: "ah-store-96086.firebaseapp.com",
      projectId: "ah-store-96086",
      storageBucket: "ah-store-96086.firebasestorage.app",
      messagingSenderId: "79701369482",
      appId: "1:79701369482:web:70d0a1e8d7dc59a173c373",
      measurementId: "G-3C9M1N18LN"
    };

    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // إضافة ملاحظة
    async function addNote() {
      const marketer = document.getElementById("marketerName").value.trim();
      const note = document.getElementById("noteText").value.trim();

      if (!marketer || !note) {
        alert("من فضلك اكتب اسمك والملاحظة");
        return;
      }

      await db.collection("users").doc(marketer).collection("notes").add({
        text: note,
        timestamp: new Date()
      });

      document.getElementById("noteText").value = "";
      loadNotes();
    }

    // تحميل الملاحظات
    async function loadNotes() {
      const marketer = document.getElementById("marketerName").value.trim();
      if (!marketer) return;

      const notesList = document.getElementById("notesList");
      notesList.innerHTML = "";

      const snapshot = await db.collection("users").doc(marketer).collection("notes").orderBy("timestamp", "desc").get();
      snapshot.forEach(doc => {
        const div = document.createElement("div");
        div.className = "note";
        div.textContent = doc.data().text;
        notesList.appendChild(div);
      });
    }

    // تحميل الملاحظات عند تغيير الاسم
    document.getElementById("marketerName").addEventListener("input", loadNotes);
  </script>
</body>
</html>
